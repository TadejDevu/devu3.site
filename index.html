<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>devu3.site</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 600px;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    color: #8b949e;
}

.button {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 20px;
    background: #238636;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.2s;
}

.button:hover {
    background: #2ea043;
}
    .img-center {
    display: flex;
    justify-content: center;
}

.img-center img {
    max-width: 90vw;
}
.fixed-img {
    position: fixed;
    top: 10px;     /* odmik od vrha */
    left: 10px;    /* odmik od leve */
    width: 15vw;    /* % širine zaslona */
    height: auto;
    max-width: 150px;  /* ne gre čez 150px */
    min-width: 70px;   /* ne postane premajhna */
    z-index: 1000; /* da je vedno zgoraj */
}
</style>

</head>
<body>
<img src="img/JazMali.png" class="fixed-img" alt="Me">
<div class="container">
    <h1>DeVu site</h1>
    <div class="img-center">
        <img src="img/Lukne1.jpg">
    </div>
</div>

</body>
</html>
